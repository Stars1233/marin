edition = "2023";

package finelog.logging;

// Timestamp representing milliseconds since Unix epoch. Inlined here (not a
// separate time.proto) so the file basename does not collide with iris's
// time.proto in the protobuf descriptor pool when both packages load.
message Timestamp {
  int64 epoch_ms = 1;
}

// Best-effort parsed log level for a log entry.
enum LogLevel {
  LOG_LEVEL_UNKNOWN = 0;   // Could not parse a level from the log line
  LOG_LEVEL_DEBUG = 1;
  LOG_LEVEL_INFO = 2;
  LOG_LEVEL_WARNING = 3;
  LOG_LEVEL_ERROR = 4;
  LOG_LEVEL_CRITICAL = 5;
}

// One log entry. Used both for RPC responses and for persistence.
//
// Keys are opaque strings — finelog does not parse or interpret them.
// Conventions like "/user/<job>/<task>:<attempt>" or "/system/worker/<id>"
// are caller-defined.
message LogEntry {
  Timestamp timestamp = 1;
  string source = 2;      // Free-form: "stdout", "stderr", "build", "process", ...
  string data = 3;        // Log line content
  int32 attempt_id = 4;   // Caller-defined; finelog stores and echoes it back
  LogLevel level = 5;     // Best-effort parsed level (UNKNOWN if unparseable)
  string key = 6;         // Log store key. Populated on multi-key (regex) queries.
  // Store-assigned row id: a single counter shared by every key in the store,
  // increasing in write order. Stable for the row's lifetime, so a reader can
  // name a row it has already seen and page around it (see
  // FetchLogsRequest.cursor / until_cursor). Ids of one key are not contiguous:
  // interleaved writes to other keys consume ids in between.
  int64 seq = 7;
}

// Collection of log entries for a single source.
message LogBatch {
  repeated LogEntry entries = 1;
}

// ============================================================================
// LOG SERVICE
// ============================================================================

message PushLogsRequest {
  string key = 1;
  repeated LogEntry entries = 2;
  // Origin cluster for these entries, stored on the log row's `cluster` column so
  // a global finelog can namespace logs it collects from many federated clusters.
  // Writer-supplied and trusted (every writer is authenticated); a relay sets it
  // to the cluster it forwards for. Empty for a local single-cluster push.
  string cluster = 3;
}

message PushLogsResponse {}

// How the server should interpret FetchLogsRequest.source. EXACT and
// PREFIX treat `source` as a literal string; `+`, `.`, `[` etc. match
// themselves. UNSPECIFIED falls back to REGEX so clients that encode
// their query as a regex pattern keep working.
enum MatchScope {
  MATCH_SCOPE_UNSPECIFIED = 0;
  // Read entries whose key equals `source` byte-for-byte.
  MATCH_SCOPE_EXACT = 1;
  // Read entries whose key starts with `source`. Callers bake any
  // boundary character (`/`, `:`) into `source` themselves.
  MATCH_SCOPE_PREFIX = 2;
  // `source` is a regex matched against the key.
  MATCH_SCOPE_REGEX = 3;
}

// `cursor` and `until_cursor` bound the LogEntry.seq range from below and above.
// Both are exclusive, so `cursor = X, until_cursor = Y` reads the open interval
// (X, Y). Combined with `tail` and `max_lines` they page in either direction
// around a known row: the N rows before seq X are
// `{until_cursor: X, tail: true, max_lines: N}`, and the N rows after it are
// `{cursor: X, tail: false, max_lines: N}`.
message FetchLogsRequest {
  string source = 1;           // Log source key, prefix, or regex pattern (see match_scope)
  int64 since_ms = 2;          // Only return entries with epoch_ms > since_ms
  int64 cursor = 3;            // Resume after this autoincrement id (exclusive)
  string substring = 4;        // Literal substring match on log data
  int32 max_lines = 5;         // Max entries to return (0 = server default 1000)
  bool tail = 6;               // Return last N entries instead of first N
  string min_level = 7;        // Minimum level (DEBUG/INFO/WARNING/ERROR/CRITICAL)
  MatchScope match_scope = 8;  // How `source` is interpreted
  // Restrict to rows whose origin `cluster` (set by the writer on PushLogs)
  // equals this value, so a global finelog's reads can select one federated
  // cluster's logs. Empty = unfiltered (all origins) — the local single-cluster
  // read behavior.
  string cluster = 9;
  // Stop before this autoincrement id (exclusive). 0 = unbounded above; the
  // first row ever written has seq 1, so no row is excluded by the default.
  int64 until_cursor = 10;
}

message FetchLogsResponse {
  repeated LogEntry entries = 1;
  int64 cursor = 2;            // Max autoincrement id seen (cursor for next poll)
}

service LogService {
  rpc PushLogs(PushLogsRequest) returns (PushLogsResponse);
  rpc FetchLogs(FetchLogsRequest) returns (FetchLogsResponse);
}
