name: "Pulumi deploy"
description: "Roll a service stack on the shared iac backend: GCP auth, Artifact Registry + Pulumi backend, then pulumi up."

inputs:
  stack:
    description: "Pulumi stack name (e.g. marin-grafana, ducky-marin)."
    required: true
  work-dir:
    description: "Directory holding the Pulumi.yaml (e.g. infra/grafana)."
    required: true
  service-account:
    description: "GCP service account impersonated through Workload Identity Federation."
    required: true
  workload-identity-provider:
    description: "GCP workload identity provider resource name."
    default: "projects/748532799086/locations/global/workloadIdentityPools/github-pool/providers/github-oidc"
  gcp-project-id:
    description: "GCP project id."
    required: true
  uv-sync-args:
    description: "Arguments for the venv sync (services whose program imports more than iac widen this)."
    default: "--package marin-iac --extra deploy --frozen"
  config-map:
    description: "Optional pulumi/actions config-map JSON applied before up (e.g. a deploy_generation override)."
    default: ""

runs:
  using: composite
  steps:
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v3
      with:
        project_id: ${{ inputs.gcp-project-id }}
        workload_identity_provider: ${{ inputs.workload-identity-provider }}
        service_account: ${{ inputs.service-account }}

    - name: Set up Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v3
      with:
        project_id: ${{ inputs.gcp-project-id }}

    - name: Configure registry auth
      shell: bash
      run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

    - name: Set up uv
      uses: astral-sh/setup-uv@v7

    - name: Sync the iac venv
      shell: bash
      run: uv sync ${{ inputs.uv-sync-args }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Roll the service
      uses: pulumi/actions@v6
      with:
        command: up
        stack-name: ${{ inputs.stack }}
        work-dir: ${{ inputs.work-dir }}
        cloud-url: gs://marin-iac-state
        config-map: ${{ inputs.config-map }}
