name: "Dupekit - Unit"
on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_run: ${{ steps.filter.outputs.relevant }}
      check_user_mode: ${{ steps.filter.outputs.user_mode }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4
        id: filter
        with:
          filters: |
            relevant:
              # marin-dupekit is a root workspace member (see [tool.uv.workspace]
              # in the root pyproject.toml). Its tests resolve against the root
              # uv.lock via `uv run --package marin-dupekit`, so a lock change can
              # move the suite out from under it — gate on 'uv.lock' like the
              # other workspace unit workflows.
              - 'lib/dupekit/**'
              - 'uv.lock'
              - '.github/workflows/dupekit-unit.yaml'
            # The dev-mode guard below inspects the pyprojects where a leaked
            # rust path source (written by scripts/rust_mode.py dev) lands —
            # it never rewrites uv.lock. Gate the guard on those files directly
            # so it runs whenever its targets change, without dragging the
            # expensive test/cargo jobs onto every root-pyproject edit.
            user_mode:
              - 'pyproject.toml'
              - 'lib/dupekit/pyproject.toml'
              - 'lib/finelog/pyproject.toml'

  check-user-mode:
    needs: changes
    if: needs.changes.outputs.should_run == 'true' || needs.changes.outputs.check_user_mode == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Ensure pyprojects are in user mode
        run: |
          # The RUST-DEV SOURCES blocks govern the native packages
          # (marin-dupekit-native and marin-finelog-server); any path source
          # committed means dev mode leaked.
          if grep -qE 'marin-(dupekit-native|finelog-server) = \{ path' pyproject.toml lib/dupekit/pyproject.toml lib/finelog/pyproject.toml; then
            echo "ERROR: a pyproject.toml has a dev-mode rust source. Run 'python scripts/rust_mode.py user' before committing."
            exit 1
          fi

  unit-test:
    needs: [changes, check-user-mode]
    if: needs.changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Test dupekit
        # Resolve against the root workspace lock (marin-dupekit is a member);
        # the native marin-dupekit-native extension comes from its pre-built
        # wheel, so no Rust toolchain is needed here.
        run: |
          uv run --package marin-dupekit --group test pytest --durations=5 --tb=short -v lib/dupekit/tests/

  rust-checks:
    needs: changes
    if: needs.changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy, rustfmt
      - name: cargo fmt
        run: cargo fmt --manifest-path lib/dupekit/rust/Cargo.toml -- --check
      - name: cargo clippy
        run: cargo clippy --manifest-path lib/dupekit/rust/Cargo.toml -- -D warnings
      - name: cargo test
        run: cargo test --manifest-path lib/dupekit/rust/Cargo.toml
