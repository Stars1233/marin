<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- href is rewritten at serve time from X-Forwarded-Prefix so the bundle
         works under the controller proxy sub-path (/proxy/datakit_explorer/);
         fetch() and asset URLs both resolve relative to it. -->
    <base href="/" />
    <title><%= title %></title>
    <script>
      try {
        var stored = localStorage.getItem('datakit-explorer-dark-mode');
        if (stored === 'true' || (stored === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    </script>
  </head>
  <body class="bg-surface text-text font-sans antialiased">
    <div id="app"></div>
  </body>
</html>
