<meta charset="utf-8">
<title>__TITLE__</title>
<style>
:root{
  --ground:#fbfcfd; --panel:#ffffff; --panel2:#f3f5f8; --ink:#141821; --ink2:#5a6473;
  --line:#dbe0e8; --accent:#0f8f8c; --accent-ink:#0b6b69;
  --q0:#c1443b; --q1:#d98b3f; --q2:#c9b23e; --q3:#86a94e; --q4:#3f9457;
  --shadow:0 1px 2px rgba(20,30,50,.06),0 3px 12px rgba(20,30,50,.05);
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
@media (prefers-color-scheme:dark){:root{
  --ground:#0f1319; --panel:#161b23; --panel2:#1c222c; --ink:#e7ecf3; --ink2:#94a0b2;
  --line:#28303c; --accent:#2bb7b3; --accent-ink:#8fe3e0; --shadow:0 1px 2px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.35);
}}
*{box-sizing:border-box}
body{margin:0;background:var(--ground);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5}
.wrap{max-width:1180px;margin:0 auto;padding:28px 22px 120px}
h1{font-size:20px;font-weight:650;margin:0;letter-spacing:-.01em}
h2{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--ink2);
  margin:38px 0 14px;display:flex;align-items:center;gap:10px}
h2::after{content:"";flex:1;height:1px;background:var(--line)}
h3{font-size:13px;font-weight:600;margin:24px 0 8px;font-family:var(--mono)}
h3 span{color:var(--ink2);font-weight:400}
.sub{color:var(--ink2);font-size:13px;margin-top:5px;font-family:var(--mono)}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:20px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:14px 16px;box-shadow:var(--shadow)}
.card .k{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink2)}
.card .v{font-family:var(--mono);font-size:24px;font-weight:600;margin-top:4px;font-variant-numeric:tabular-nums}
.card .d{font-size:12px;color:var(--ink2);margin-top:2px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;box-shadow:var(--shadow)}
table{border-collapse:collapse;width:100%;font-size:13px}
th,td{text-align:right;padding:6px 9px;border-bottom:1px solid var(--line);white-space:nowrap}
th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink2);position:sticky;top:0;background:var(--panel)}
td:first-child,th:first-child{text-align:left;font-family:var(--mono)}
td.num{font-family:var(--mono);font-variant-numeric:tabular-nums}
td.heat{font-family:var(--mono);font-variant-numeric:tabular-nums}
td.wide,th.wide{white-space:normal;word-break:break-all}
.tablewrap{max-height:560px;overflow:auto;border:1px solid var(--line);border-radius:12px}
details.drawer{background:var(--panel);border:1px solid var(--line);border-radius:10px;margin:8px 0;box-shadow:var(--shadow)}
details.drawer summary{cursor:pointer;padding:9px 14px;display:flex;gap:14px;align-items:baseline;
  font-family:var(--mono);font-size:12px}
details.drawer summary .ov{color:var(--accent-ink);font-weight:600;white-space:nowrap}
details.drawer summary .id{color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
details.drawer pre{margin:0;padding:12px 14px;border-top:1px solid var(--line);background:var(--panel2);
  border-radius:0 0 10px 10px;white-space:pre-wrap;word-break:break-word;font-family:var(--mono);font-size:12px;
  max-height:340px;overflow:auto}
</style>
<div class="wrap">
  <header>
    <h1>__TITLE__</h1>
    <div class="sub" id="meta"></div>
    <div class="sub" id="sampling"></div>
  </header>
  <div class="cards" id="cards"></div>
  <h2>per-source contamination</h2>
  <div class="tablewrap"><table id="srcs"></table></div>
  <h2>eval attribution</h2>
  <div id="evals"></div>
  <h2>flagged examples</h2>
  <div id="flagged"></div>
</div>
<script>
const D = __DATA__;
const fmt = n => n >= 1e12 ? (n/1e12).toFixed(2)+"T" : n >= 1e9 ? (n/1e9).toFixed(2)+"B"
  : n >= 1e6 ? (n/1e6).toFixed(2)+"M" : n >= 1e3 ? (n/1e3).toFixed(1)+"K" : String(n);
const pct = r => { const p = 100*r; return (p >= 1 ? p.toFixed(2) : p.toFixed(4)) + "%"; };
const esc = s => s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const S = D.stats;
document.getElementById("meta").textContent = `eval index: ${D.meta.eval_hash_index_path}`;
document.getElementById("sampling").textContent = D.meta.sampling;
const cards = [
  ["contamination", pct(S.contamination_rate), `of ${fmt(S.total_docs)} docs`],
  ["contaminated", fmt(S.contaminated_docs), "docs flagged"],
  ["clean", fmt(S.clean_docs), "docs kept"],
  ["sources", S.n_sources, "marked against the eval bloom"],
  ["flagged sampled", fmt(S.n_flagged_sampled), "examples below"],
  ["evals hit", fmt(S.n_evals_hit), "by sampled matched hashes"],
];
document.getElementById("cards").innerHTML = cards.map(([k,v,d]) =>
  `<div class="card"><div class="k">${k}</div><div class="v">${v}</div><div class="d">${d}</div></div>`).join("");
const maxRate = Math.max(1e-12, ...D.sources.map(s => s.rate));
let rows = `<tr><th>source</th><th>contaminated</th><th>clean</th><th>rate</th></tr>`;
for (const s of D.sources) {
  const alpha = s.rate ? (0.12 + 0.55 * Math.sqrt(s.rate/maxRate)).toFixed(3) : 0;
  rows += `<tr><td>${esc(s.name)}</td><td class="num">${fmt(s.contaminated)}</td><td class="num">${fmt(s.clean)}</td>` +
    `<td class="heat" style="background:color-mix(in srgb, var(--q0) ${Math.round(alpha*100)}%, transparent)">${pct(s.rate)}</td></tr>`;
}
document.getElementById("srcs").innerHTML = rows;
document.getElementById("evals").innerHTML = D.eval_hits.length
  ? `<div class="tablewrap"><table><tr><th class="wide">eval record</th><th>sampled hash hits</th></tr>` +
    D.eval_hits.map(e => `<tr><td class="wide">${esc(e.eval_id)}</td><td class="num">${fmt(e.hits)}</td></tr>`).join("") +
    `</table></div>`
  : `<div class="panel" style="color:var(--ink2)">no eval hits — no sampled matched hashes to attribute</div>`;
document.getElementById("flagged").innerHTML = D.flagged.length
  ? D.flagged.map(g =>
      `<h3>${esc(g.source)} <span>${g.rows.length} sampled</span></h3>` +
      g.rows.map(r =>
        `<details class="drawer"><summary><span class="ov">overlap ${r.max_overlap.toFixed(2)}</span>` +
        `<span class="id">${esc(r.id)}</span></summary><pre>${esc(r.text)}</pre></details>`).join("")
    ).join("")
  : `<div class="panel" style="color:var(--ink2)">no flagged samples — sampled sources are clean</div>`;
</script>
