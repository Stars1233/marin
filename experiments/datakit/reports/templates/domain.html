<meta charset="utf-8">
<title>__TITLE__</title>
<style>
:root{
  --ground:#fbfcfd; --panel:#ffffff; --panel2:#f3f5f8; --ink:#141821; --ink2:#5a6473;
  --line:#dbe0e8; --accent:#0f8f8c; --accent-ink:#0b6b69;
  --q0:#c1443b; --q1:#d98b3f; --q2:#c9b23e; --q3:#86a94e; --q4:#3f9457;
  --shadow:0 1px 2px rgba(20,30,50,.06),0 3px 12px rgba(20,30,50,.05);
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
@media (prefers-color-scheme:dark){:root{
  --ground:#0f1319; --panel:#161b23; --panel2:#1c222c; --ink:#e7ecf3; --ink2:#94a0b2;
  --line:#28303c; --accent:#2bb7b3; --accent-ink:#8fe3e0; --shadow:0 1px 2px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.35);
}}
*{box-sizing:border-box}
body{margin:0;background:var(--ground);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5}
.wrap{max-width:1180px;margin:0 auto;padding:28px 22px 120px}
h1{font-size:20px;font-weight:650;margin:0;letter-spacing:-.01em}
h2{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--ink2);
  margin:38px 0 14px;display:flex;align-items:center;gap:10px}
h2::after{content:"";flex:1;height:1px;background:var(--line)}
.sub{color:var(--ink2);font-size:13px;margin-top:5px;font-family:var(--mono)}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:20px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:14px 16px;box-shadow:var(--shadow)}
.card .k{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink2)}
.card .v{font-family:var(--mono);font-size:24px;font-weight:600;margin-top:4px;font-variant-numeric:tabular-nums}
.card .d{font-size:12px;color:var(--ink2);margin-top:2px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;box-shadow:var(--shadow)}
table{border-collapse:collapse;width:100%;font-size:13px}
th,td{text-align:right;padding:6px 9px;border-bottom:1px solid var(--line);white-space:nowrap}
th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink2);position:sticky;top:0;background:var(--panel)}
td:first-child,th:first-child{text-align:left;font-family:var(--mono)}
td.num{font-family:var(--mono);font-variant-numeric:tabular-nums}
td.heat{font-family:var(--mono);font-variant-numeric:tabular-nums}
.tablewrap{max-height:560px;overflow:auto;border:1px solid var(--line);border-radius:12px}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin:10px 0 0;font-size:12px;color:var(--ink2)}
.legend b{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:-1px}
.bars{display:flex;align-items:flex-end;gap:2px;height:160px;overflow-x:auto;padding-top:6px}
.bars .bar{flex:1 0 5px;min-width:4px;background:var(--accent);border-radius:2px 2px 0 0}
.stack{display:flex;height:12px;min-width:160px;border-radius:3px;overflow:hidden;background:var(--panel2)}
.stack div{height:100%}
td.share{text-align:left}
</style>
<div class="wrap">
  <header>
    <h1>__TITLE__</h1>
    <div class="sub" id="meta"></div>
    <div class="sub" id="datanote"></div>
  </header>
  <div class="cards" id="cards"></div>
  <h2>cluster occupancy (sampled)</h2>
  <div class="panel">
    <div class="bars" id="occupancy"></div>
    <div class="sub" id="occnote"></div>
  </div>
  <h2>sources</h2>
  <div class="tablewrap"><table id="sources"></table></div>
  <h2>cluster concentration</h2>
  <div class="tablewrap"><table id="conc"></table></div>
  <div class="legend" id="legend"></div>
</div>
<script>
const D = __DATA__;
const fmt = n => n >= 1e12 ? (n/1e12).toFixed(2)+"T" : n >= 1e9 ? (n/1e9).toFixed(2)+"B"
  : n >= 1e6 ? (n/1e6).toFixed(2)+"M" : n >= 1e3 ? (n/1e3).toFixed(1)+"K" : String(n);
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const S = D.stats, M = D.meta;
document.getElementById("meta").textContent =
  `K=${M.k_train} trained · views=[${M.k_views.join(", ")}] · occupancy view K=${M.cluster_view} · sample ≤${M.sample_limit}/source`;
document.getElementById("datanote").textContent = `data root ${M.data_root} · ${M.sampling}`;
const cards = [
  ["docs assigned", fmt(S.docs_assigned), "assign/docs_in"],
  ["K trained", S.k_train, `${S.n_views} coarser views`],
  ["view", `K=${S.cluster_view}`, "occupancy + concentration"],
  ["sources", S.n_sources, `${fmt(S.sampled_rows)} rows sampled`],
  ["clusters seen", S.clusters_seen, `of ${S.cluster_view} in view`],
];
document.getElementById("cards").innerHTML = cards.map(([k,v,d]) =>
  `<div class="card"><div class="k">${k}</div><div class="v">${v}</div><div class="d">${d}</div></div>`).join("");

const maxOcc = Math.max(1, ...D.occupancy.map(([,n]) => n));
document.getElementById("occupancy").innerHTML = D.occupancy.map(([c,n]) =>
  `<div class="bar" style="height:${Math.max(2, Math.round(150*n/maxOcc))}px" title="cluster ${c}: ${n.toLocaleString()} sampled docs"></div>`).join("");
document.getElementById("occnote").textContent =
  `cluster_${M.cluster_view} over ${fmt(S.sampled_rows)} sampled docs · bars sorted by cluster id · hover for counts`;

let srcRows = `<tr><th>source</th><th>docs</th><th>sampled</th><th>top clusters (sample)</th>` +
  `<th>dist_${M.k_train} p50</th><th>p90</th></tr>`;
for (const s of D.sources) {
  const tops = s.top_clusters.map(([c,n]) => `c${c} ${(100*n/s.sampled).toFixed(0)}%`).join(" · ");
  srcRows += `<tr><td>${esc(s.name)}</td><td class="num">${fmt(s.docs)}</td><td class="num">${fmt(s.sampled)}</td>` +
    `<td class="num">${tops}</td><td class="num">${s.dist_p50.toPrecision(3)}</td>` +
    `<td class="num">${s.dist_p90.toPrecision(3)}</td></tr>`;
}
document.getElementById("sources").innerHTML = srcRows;

const srcColor = Object.fromEntries(D.sources.map((s,i) => [s.name, `hsl(${Math.round(i*137.5)%360} 55% 52%)`]));
let concRows = `<tr><th>cluster</th><th>sampled</th><th>share</th><th>source mix</th><th>dominant sources</th></tr>`;
for (const c of D.concentration) {
  const stack = c.sources.map(([s,n]) =>
    `<div style="width:${(100*n/c.sampled).toFixed(1)}%;background:${srcColor[s]}" title="${esc(s)}: ${n.toLocaleString()}"></div>`).join("");
  const mix = c.sources.slice(0,3).map(([s,n]) => `${esc(s)} ${(100*n/c.sampled).toFixed(0)}%`).join(" · ");
  concRows += `<tr><td>c${c.cluster}</td><td class="num">${fmt(c.sampled)}</td>` +
    `<td class="num">${(100*c.sampled/S.sampled_rows).toFixed(1)}%</td>` +
    `<td class="share"><div class="stack">${stack}</div></td><td class="num">${mix}</td></tr>`;
}
document.getElementById("conc").innerHTML = concRows;
document.getElementById("legend").innerHTML = D.sources.map(s =>
  `<span><b style="background:${srcColor[s.name]}"></b>${esc(s.name)}</span>`).join("");
</script>
