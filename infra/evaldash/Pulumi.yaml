name: marin-evaldash
runtime:
  name: python
  # Pin the shared repo venv (which has the `iac` helper package and the Pulumi GCP/Docker
  # providers via marin-iac). Without this, Pulumi's Auto toolchain would pick up this
  # directory's own `.venv` if one existed, which has no Pulumi SDK.
  options:
    virtualenv: ../../.venv
description: The Marin eval-results dashboard as an IAP-gated Cloud Run service.
# The state backend is selected by the operator/CI environment and shared with infra/pulumi
# (see README.md):
#   pulumi login gs://marin-iac-state
# Pulumi.marin-evaldash.yaml records the production stack's shared GCP KMS provider.
